name: Language Bindings

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'bindings/**'
      - 'include/**'
      - 'src/**'
      - 'backends/**'
      - 'third_party/pybind11/**'
      - 'third_party/sol2/**'
      - 'CMakeLists.txt'
      - '.github/workflows/language_bindings.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'bindings/**'
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
  workflow_dispatch:

jobs:
  python:
    name: Python Binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            python3-dev \
            python3-numpy \
            python3-pytest

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=ON \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF

      - name: Build
        run: cd build && cmake --build . -j$(nproc)

      - name: Test Python binding
        run: |
          export PYTHONPATH=bindings/python:build/bindings/python
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          python3 -m pytest tests/bindings/test_python_binding.py tests/bindings/test_numerical_correctness.py -v

  lua:
    name: Lua Binding (LuaJIT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            luajit \
            libluajit-5.1-dev

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=ON \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF

      - name: Build
        run: cd build && cmake --build . -j$(nproc)

      - name: Test Lua binding
        run: |
          export LUA_CPATH="build/bindings/lua/?.so;bindings/lua/?/init.lua;;"
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          luajit tests/bindings/test_lua_binding.lua

  julia:
    name: Julia Binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=ON

      - name: Build
        run: cd build && cmake --build . -j$(nproc)

      - name: Test Julia binding
        run: |
          cp bindings/julia/Insight.jl build/bindings/julia/Insight.jl
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          julia tests/bindings/test_binding.jl
