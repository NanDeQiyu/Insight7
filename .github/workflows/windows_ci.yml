name: Windows CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backends/**'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - '!bindings/**/*.md'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backends/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  workflow_dispatch:

jobs:
  cpp-tests:
    name: C++ Tests (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        shell: bash
        run: |
          vcpkg install fftw3:x64-windows
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=ON \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:$PATH"
          build/tests/insight_tests_cpu.exe

  python-binding:
    name: Python Binding
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          pip install numpy pytest
          vcpkg install fftw3:x64-windows
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=ON \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:$PATH"
          export PYTHONPATH="$GITHUB_WORKSPACE/bindings/python"
          python -m pytest tests/cpu/python/ -v --tb=short

  lua-binding:
    name: Lua Binding (x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install Lua 5.1 and busted
        shell: bash
        run: |
          choco install lua51 -y
          luarocks install busted

      - name: Install dependencies
        shell: bash
        run: |
          vcpkg install fftw3:x86-windows openblas:x86-windows

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build_x86 -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=ON \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/vcpkg/installed/x86-windows"
          cmake --build build_x86 -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export LUA_CPATH="$GITHUB_WORKSPACE/build_x86/bindings/lua/?.dll;;"
          export LUA_PATH="$GITHUB_WORKSPACE/bindings/lua/?/init.lua;$GITHUB_WORKSPACE/bindings/lua/?.lua;;"
          export PATH="$GITHUB_WORKSPACE/build_x86/backends/cpu:$PATH"
          busted --lua=lua5.1 --no-auto-insulate --pattern="test_.+%.lua" $GITHUB_WORKSPACE/tests/cpu/lua/

  julia-binding:
    name: Julia Binding
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Install dependencies
        shell: bash
        run: |
          vcpkg install fftw3:x64-windows
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=ON \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/build/backends/cpu:$LD_LIBRARY_PATH"
          julia tests/bindings/test_binding.jl
