name: Windows CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backends/**'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - '!bindings/**/*.md'
      - 'demos/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backends/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  workflow_dispatch:

jobs:
  cpu-tests:
    name: Windows CPU Tests (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install FFTW3 and OpenBLAS via vcpkg
        shell: bash
        run: |
          vcpkg install fftw3:x64-windows openblas:x64-windows

      - name: Install OpenBLAS with LAPACKE headers
        shell: bash
        run: |
          # Download OpenBLAS 0.3.33 with LAPACKE headers (vcpkg version lacks them)
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build -G Ninja ^
            -DCMAKE_C_COMPILER=cl.exe ^
            -DCMAKE_CXX_COMPILER=cl.exe ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DINSIGHT_WITH_CUDA=OFF ^
            -DINSIGHT_USE_FFTW3=ON ^
            -DINSIGHT_USE_OPENBLAS=ON ^
            -DINSIGHT_BUILD_TESTS=ON ^
            -DINSIGHT_BUILD_DEMOS=OFF ^
            -DINSIGHT_BUILD_BINDINGS=OFF ^
            -DINSIGHT_USE_SNDFILE=OFF ^
            -DINSIGHT_USE_MATPLOT=OFF ^
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"

      - name: Build
        run: cmake --build build -j %NUMBER_OF_PROCESSORS%

      - name: Run CPU tests
        run: |
          set PATH=C:\deps\OpenBLAS-0.3.33-x64\bin;%PATH%
          build\tests\insight_tests_cpu.exe

  python-binding:
    name: Windows Python Binding
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install numpy pytest

      - name: Install FFTW3 and OpenBLAS via vcpkg
        shell: bash
        run: |
          vcpkg install fftw3:x64-windows openblas:x64-windows

      - name: Install OpenBLAS with LAPACKE headers
        shell: bash
        run: |
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build -G Ninja ^
            -DCMAKE_C_COMPILER=cl.exe ^
            -DCMAKE_CXX_COMPILER=cl.exe ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DINSIGHT_WITH_CUDA=OFF ^
            -DINSIGHT_USE_FFTW3=ON ^
            -DINSIGHT_USE_OPENBLAS=ON ^
            -DINSIGHT_BUILD_TESTS=OFF ^
            -DINSIGHT_BUILD_DEMOS=OFF ^
            -DINSIGHT_BUILD_BINDINGS=ON ^
            -DINSIGHT_BUILD_PYTHON_BINDING=ON ^
            -DINSIGHT_BUILD_LUA_BINDING=OFF ^
            -DINSIGHT_BUILD_JULIA_BINDING=OFF ^
            -DINSIGHT_USE_SNDFILE=OFF ^
            -DINSIGHT_USE_MATPLOT=ON ^
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"

      - name: Build
        run: cmake --build build -j %NUMBER_OF_PROCESSORS%

      - name: Test Python binding
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:$PATH"
          export PYTHONPATH="$GITHUB_WORKSPACE/bindings/python"
          python -m pytest tests/cpu/python/ -v --tb=short -k "not test_plot"
          python -m pytest tests/cpu/python/test_plot.py -v --tb=short

  cpp-demos:
    name: Windows C++ Demos
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install FFTW3 and OpenBLAS via vcpkg
        shell: bash
        run: |
          vcpkg install fftw3:x64-windows openblas:x64-windows

      - name: Install OpenBLAS with LAPACKE headers
        shell: bash
        run: |
          curl -L -o openblas.zip "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip"
          unzip -q openblas.zip -d C:/deps/

      - name: Install gnuplot
        run: choco install gnuplot -y

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build -G Ninja ^
            -DCMAKE_C_COMPILER=cl.exe ^
            -DCMAKE_CXX_COMPILER=cl.exe ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DINSIGHT_WITH_CUDA=OFF ^
            -DINSIGHT_USE_FFTW3=ON ^
            -DINSIGHT_USE_OPENBLAS=ON ^
            -DINSIGHT_USE_MATPLOT=ON ^
            -DINSIGHT_BUILD_DEMOS=ON ^
            -DINSIGHT_BUILD_TESTS=OFF ^
            -DINSIGHT_BUILD_BINDINGS=OFF ^
            -DINSIGHT_USE_SNDFILE=OFF ^
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"

      - name: Build
        run: cmake --build build -j %NUMBER_OF_PROCESSORS%

      - name: Run C++ demos
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:$PATH"
          cd build/bin/demos
          ./demo_basic_ops.exe
          ./demo_linalg.exe
          ./demo_fft.exe
          ./demo_gpu_transfer.exe
          ./demo_radar_task1.exe
