name: Windows CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backends/**'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - '!bindings/**/*.md'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backends/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'bindings/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows_ci.yml'
  workflow_dispatch:

jobs:
  cpp-tests:
    name: C++ Tests (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        shell: pwsh
        run: |
          vcpkg install fftw3:x64-windows
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip" -OutFile openblas.zip
          New-Item -ItemType Directory -Force -Path C:\deps | Out-Null
          Expand-Archive -Path openblas.zip -DestinationPath C:\deps -Force
          if (-not (Test-Path "C:\deps\OpenBLAS-0.3.33-x64\bin\libopenblas.dll")) {
            Write-Error "OpenBLAS extraction failed"; exit 1
          }

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=ON \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          cp /c/deps/OpenBLAS-0.3.33-x64/bin/*.dll build/tests/
          cp /c/vcpkg/installed/x64-windows/bin/fftw*.dll build/tests/
          cd build/tests && ./insight_tests_cpu.exe

  python-binding:
    name: Python Binding
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install numpy pytest
          vcpkg install fftw3:x64-windows
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip" -OutFile openblas.zip
          New-Item -ItemType Directory -Force -Path C:\deps | Out-Null
          Expand-Archive -Path openblas.zip -DestinationPath C:\deps -Force
          if (-not (Test-Path "C:\deps\OpenBLAS-0.3.33-x64\bin\libopenblas.dll")) {
            Write-Error "OpenBLAS extraction failed"; exit 1
          }

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=ON \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE/bindings/python"
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:/c/vcpkg/installed/x64-windows/bin:$PATH"
          python -m pytest tests/cpu/python/ -v --tb=short

  lua-binding:
    name: Lua Binding (x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install Lua 5.1 and dependencies
        shell: bash
        run: |
          choco install lua51 luarocks -y
          # Create wrapper script to intercept MSVC link.exe (MSYS2 link shadows it)
          MSVC_LINK="$(find "/c/Program Files/Microsoft Visual Studio" -path "*/HostX86/x86/link.exe" 2>/dev/null | head -1)"
          echo '#!/bin/bash' > /usr/local/bin/link
          echo "exec \"$MSVC_LINK\" \"\$@\"" >> /usr/local/bin/link
          chmod +x /usr/local/bin/link
          export PATH="/c/ProgramData/chocolatey/bin:/c/ProgramData/chocolatey/lib/lua51/tools:$PATH"
          luarocks install busted

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          vcpkg install fftw3:x86-windows openblas:x86-windows

      - name: Configure & Build
        shell: bash
        run: |
          export PATH="/c/ProgramData/chocolatey/bin:/c/Program Files (x86)/Lua/5.1:$PATH"
          cmake -S . -B build_x86 -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=ON \
            -DINSIGHT_BUILD_JULIA_BINDING=OFF \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/vcpkg/installed/x86-windows"
          cmake --build build_x86 -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PATH="/c/ProgramData/chocolatey/bin:/c/Program Files (x86)/Lua/5.1:$GITHUB_WORKSPACE/build_x86/backends/cpu:/c/vcpkg/installed/x86-windows/bin:$PATH"
          export LUA_CPATH="$GITHUB_WORKSPACE/build_x86/bindings/lua/?.dll;;"
          export LUA_PATH="$GITHUB_WORKSPACE/bindings/lua/?/init.lua;$GITHUB_WORKSPACE/bindings/lua/?.lua;;"
          busted --lua=lua5.1 --no-auto-insulate --pattern="test_.+%.lua" $GITHUB_WORKSPACE/tests/cpu/lua/

  julia-binding:
    name: Julia Binding
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          vcpkg install fftw3:x64-windows
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip" -OutFile openblas.zip
          New-Item -ItemType Directory -Force -Path C:\deps | Out-Null
          Expand-Archive -Path openblas.zip -DestinationPath C:\deps -Force
          if (-not (Test-Path "C:\deps\OpenBLAS-0.3.33-x64\bin\libopenblas.dll")) {
            Write-Error "OpenBLAS extraction failed"; exit 1
          }

      - name: Configure & Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=cl.exe \
            -DCMAKE_CXX_COMPILER=cl.exe \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_DEMOS=OFF \
            -DINSIGHT_BUILD_BINDINGS=ON \
            -DINSIGHT_BUILD_PYTHON_BINDING=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=ON \
            -DINSIGHT_USE_SNDFILE=OFF \
            -DINSIGHT_USE_MATPLOT=OFF \
            -DCMAKE_PREFIX_PATH="C:/deps/OpenBLAS-0.3.33-x64;C:/vcpkg/installed/x64-windows"
          cmake --build build -j $(nproc)

      - name: Run tests
        shell: bash
        run: |
          export PATH="/c/deps/OpenBLAS-0.3.33-x64/bin:/c/vcpkg/installed/x64-windows/bin:$PATH"
          # Use forward-slash paths to avoid Julia backslash escape issues
          JLDIR="$(cygpath -m "$GITHUB_WORKSPACE")"
          total_pass=0; total_fail=0; fail_list=""
          for f in tests/cpu/julia/test_*.jl; do
            echo "=== Running $f ==="
            if julia -e "push!(LOAD_PATH, raw\"$JLDIR/bindings/julia\"); include(raw\"$JLDIR/$f\")"; then
              total_pass=$((total_pass + 1))
            else
              total_fail=$((total_fail + 1))
              fail_list="$fail_list $f"
              echo "WARN: $f had errors"
            fi
          done
          echo ""
          echo "=== Julia test summary: $total_pass passed, $total_fail failed ==="
          if [ -n "$fail_list" ]; then
            echo "Failed tests:$fail_list"
            exit 1
          fi
