name: Demo Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'demos/**'
      - 'bindings/**'
      - 'include/**'
      - 'src/**'
      - 'backends/**'
      - 'CMakeLists.txt'
      - '.github/workflows/demo_tests.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'demos/**'
      - 'bindings/**'
      - 'backends/**'
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/demo_tests.yml'
  workflow_dispatch:

jobs:
  cpp-demos:
    name: C++ Demos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            gnuplot-nox

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_USE_MATPLOT=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF

      - name: Build
        run: cd build && cmake --build . -j$(nproc)

      - name: Run C++ demos
        run: |
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          cd build/bin/demos
          ./demo_basic_ops
          ./demo_linalg
          ./demo_fft
          ./demo_radar_task1

  python-demos:
    name: Python Demos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            python3-dev \
            python3-numpy \
            gnuplot-nox

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_PYTHON_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Python demos
        run: |
          export PYTHONPATH=bindings/python
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          python3 demos/python/basic_ops.py
          python3 demos/python/linalg_demo.py
          python3 demos/python/fft_demo.py
          python3 demos/python/sndfile_demo.py
          python3 demos/python/radar_task1.py

  lua-demos:
    name: Lua Demos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            luajit \
            libluajit-5.1-dev \
            gnuplot-nox

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Lua demos
        run: |
          export LUA_CPATH="$GITHUB_WORKSPACE/build/bindings/lua/?.so;;"
          export LUA_PATH="$GITHUB_WORKSPACE/bindings/lua/?/init.lua;$GITHUB_WORKSPACE/bindings/lua/?.lua;;"
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build/backends/cpu:$LD_LIBRARY_PATH
          luajit demos/lua/basic_ops.lua
          luajit demos/lua/linalg_demo.lua
          luajit demos/lua/fft_demo.lua
          luajit demos/lua/sndfile_demo.lua
          luajit demos/lua/radar_task1.lua

  julia-demos:
    name: Julia Demos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            gnuplot-nox

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Julia demos
        run: |
          cp bindings/julia/Insight.jl build/bindings/julia/Insight.jl
          cp -r bindings/julia/modules build/bindings/julia/modules
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build/backends/cpu:$GITHUB_WORKSPACE/build/bindings/julia:$LD_LIBRARY_PATH
          julia demos/julia/basic_ops.jl
          julia demos/julia/linalg_demo.jl
          julia demos/julia/fft_demo.jl
          julia demos/julia/sndfile_demo.jl
          julia demos/julia/radar_task1.jl
