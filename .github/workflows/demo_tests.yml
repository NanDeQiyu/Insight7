name: Demo Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'demos/**'
      - 'bindings/**'
      - 'include/**'
      - 'src/**'
      - 'backends/**'
      - 'CMakeLists.txt'
      - '.github/workflows/demo_tests.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'demos/**'
      - 'bindings/**'
      - 'backends/**'
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/demo_tests.yml'
  workflow_dispatch:

jobs:
  cpp-demos:
    name: C++ Demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF

      - name: Build
        run: cd build && cmake --build . -j$(nproc)

      - name: Run C++ demos
        run: |
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          cd build/bin/demos
          for demo in demo_basic_ops demo_linalg demo_fft; do
            echo "=== Running $demo ==="
            ./$demo || echo "WARN: $demo failed (may require GPU)"
          done

  python-demos:
    name: Python Demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            python3-dev \
            python3-numpy

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_PYTHON_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Python demos
        run: |
          export PYTHONPATH=bindings/python
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          python3 demos/python/basic_ops.py || echo "WARN: basic_ops.py failed"
          python3 demos/python/linalg_demo.py || echo "WARN: linalg_demo.py failed"
          python3 demos/python/fft_demo.py || echo "WARN: fft_demo.py failed"

  lua-demos:
    name: Lua Demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential \
            luajit \
            libluajit-5.1-dev

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_LUA_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Lua demos
        run: |
          export LUA_CPATH="build/bindings/lua/?.so;;"
          export LUA_PATH="bindings/lua/?/init.lua;bindings/lua/?.lua;;"
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          luajit demos/lua/basic_ops.lua || echo "WARN: basic_ops.lua failed"
          luajit demos/lua/linalg_demo.lua || echo "WARN: linalg_demo.lua failed"
          luajit demos/lua/fft_demo.lua || echo "WARN: fft_demo.lua failed"

  julia-demos:
    name: Julia Demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_DEMOS=ON \
            -DINSIGHT_BUILD_TESTS=OFF \
            -DINSIGHT_BUILD_JULIA_BINDING=ON
          cmake --build . -j$(nproc)

      - name: Run Julia demos
        run: |
          cp bindings/julia/Insight.jl build/bindings/julia/Insight.jl
          export LD_LIBRARY_PATH=build/backends/cpu:$LD_LIBRARY_PATH
          julia demos/julia/basic_ops.jl || echo "WARN: basic_ops.jl failed"
          julia demos/julia/linalg_demo.jl || echo "WARN: linalg_demo.jl failed"
          julia demos/julia/fft_demo.jl || echo "WARN: fft_demo.jl failed"
