name: "CLA Assistant"
on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://raw.githubusercontent.com/PlumBlossomMaid/Insight7/main/.github/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          repository: 'PlumBlossomMaid/Insight7'
          allowlist: |
            dependabot[bot]
            github-actions[bot]
            PlumBlossomMaid
          lock-pullrequest-aftermerge: true
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA.'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          
