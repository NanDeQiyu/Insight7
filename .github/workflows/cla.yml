name: "CLA Assistant"
on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "Check if CLA needs to be signed"
        uses: sapk/pla-action@v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          cla-file-url: 'https://raw.githubusercontent.com/PlumBlossomMaid/Insight7/main/.github/CLA.md'
          sign-file-path: 'signatures/version1/cla.json'
          sign-file-branch: 'main'
          allowlist: |
            PlumBlossomMaid
            你的学弟用户名
          whitelist: |
            PlumBlossomMaid
            你的学弟用户名
          require-allowlist: false
          lock-pullrequest-aftermerge: true
          
