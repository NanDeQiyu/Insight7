name: CPU Tests (Full)

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backends/cpu/**'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/cpu/**'
      - 'tests/CMakeLists.txt'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cpu_tests.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backends/cpu/**'
      - 'include/**'
      - 'src/**'
      - 'tests/cpu/**'
      - 'CMakeLists.txt'
  workflow_dispatch:

jobs:
  # Job 1: Full dependencies (OpenBLAS + FFTW3)
  full:
    name: Full (OpenBLAS + FFTW3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfftw3-dev \
            libopenblas-dev \
            liblapacke-dev \
            libomp-dev \
            cmake \
            build-essential
          sudo ldconfig

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSIGHT_WITH_CUDA=OFF \
            -DINSIGHT_USE_FFTW3=ON \
            -DINSIGHT_USE_OPENBLAS=ON \
            -DINSIGHT_BUILD_TESTS=ON \
            -DINSIGHT_DYNAMIC_CPU_BACKEND=ON

      - name: Build
        run: cd build && make -j$(nproc)
      
      - name: Debug linkage (before tests)
        run: |
          cd build
          echo "=== ldd output ==="
          ldd backends/cpu/libinsight_cpu_backend.so
          echo ""
          echo "=== Check openblas library ==="
          ls -la /usr/lib/x86_64-linux-gnu/libopenblas*
          echo ""
          echo "=== LAPACKE symbols in libopenblas.so ==="
          nm -D /usr/lib/x86_64-linux-gnu/libopenblas.so 2>&1 | grep LAPACKE || echo "No LAPACKE symbols found"
          echo ""
          echo "=== Check lapacke library ==="
          ls -la /usr/lib/x86_64-linux-gnu/liblapacke*
          echo ""
          echo "=== LAPACKE symbols in liblapacke.so ==="
          nm -D /usr/lib/x86_64-linux-gnu/liblapacke.so 2>&1 | grep LAPACKE || echo "No LAPACKE symbols found"
          echo ""
          echo "=== LAPACKE symbols in libinsight_cpu_backend.so ==="
          nm -D backends/cpu/libinsight_cpu_backend.so 2>&1 | grep LAPACKE || echo "No LAPACKE symbols found"
      
      - name: Run tests
        run: |
          cd build
          export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
          ctest --output-on-failure -j$(nproc)

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-full
          path: build/Testing/Temporary/

  # Job 2: No FFTW3 (fallback to internal implementation)
  no-fftw:
    name: No FFTW3 (internal fallback)
